data:
  raw_dir: data/raw
  processed_dir: data/processed
  distortion: noise        # noise | blur | mask
  distortion_var: 0.05

preprocessing:
  filter: gaussian         # gaussian | median
  kernel_size: 5

vae:
  latent_dim: 64
  epochs: 20
  lr: 0.001

diffusion:
  timesteps: 1000
  beta_start: 0.0001
  beta_end: 0.02
  epochs: 30
  lr: 0.0002

ocr:
  epochs: 10
  lr: 0.001

device: cuda               # cuda | cpu
